# taskp isuner 設定ファイル

# =====================================
# Worktree設定
# =====================================
worktree:
  base_dir: ".worktrees"
  base_branch: "origin/main"
  copy_files:
    - ".env"
    - ".env.local"
  setup_commands:
    - command: "bun install"
      description: "依存関係インストール"
      on_error: "stop"

# =====================================
# マルチプレクサ設定
# =====================================
multiplexer:
  type: "tmux"
  session_prefix: "taskp"
  start_in_session: true

# =====================================
# エージェント設定（デフォルト: pi）
# =====================================
agent:
  type: "pi"

# =====================================
# Faceted Prompting（グローバルデフォルト）
# =====================================
persona: "preset:coder"
policy: "preset:coding"

# =====================================
# GitHub設定
# =====================================
github:
  include_comments: true
  max_comments: 10

# =====================================
# 並列実行設定
# =====================================
parallel:
  max_concurrent: 2
  conflict_detection:
    enabled: true
    strategy: "sequentialize"

# =====================================
# auto ワークフロー選択設定
# =====================================
auto:
  provider: anthropic
  model: claude-haiku-4-5

# =====================================
# ワークフロー定義
# =====================================
workflows:
  # 新機能実装（opencode使用）
  feature:
    description: 新機能実装（Plan → Implement → Test → Review → Merge）
    agent:
      type: "opencode"
    steps:
      - agent: plan
        instruction: "preset:plan"
        context: |
          新機能の実装計画を立ててください。

          ## 参照ドキュメント
          - docs/ARCHITECTURE.md — パッケージ構成・依存関係・レイヤー設計
          - docs/CONCEPT.md — 機能の目的・ユースケース
          - docs/CLI-SPEC.md — コマンド体系・オプション
          - docs/AI-SPEC.md — LLM連携仕様（AI SDK使用時）

          ## 設計方針
          - Bun / TypeScript strict モード
          - Vercel AI SDK（LLM連携）
          - Zod（バリデーション）
          - Vitest（テスト）
          - Biome（Lint/Format）
      - agent: implement
        instruction: "preset:implement"
        context: |
          計画に従って新機能を実装してください。

          ## 遵守事項
          - docs/arch/coding-rules.md — 命名、イミュータブル、Less Is More
          - docs/arch/design-principles.md — Tell Don't Ask、デメテルの法則
          - docs/arch/error-handling.md — Result型使用、Error/Defect分類
          - strict: true、any型禁止、1ファイル500行以下
          - インデント: Tab / 引用符: ダブルクォート / セミコロン必須
      - run: "bun run typecheck"
        description: "型チェック"
      - agent: test
        context: |
          Vitestでテストを作成してください。

          ## 方針
          - docs/arch/testing-strategy.md に従ったテスト分類
          - `bun run test` がパスすること
          - カバレッジ80%以上を目標
      - run: "bun run test"
        description: "テスト実行"
      - name: review
        max_loops: 3
        approval_policy: "on-request"
        rules:
          - condition: needs_fix
            next: implement
          - condition: approved
            next: merge
        context: |
          新機能のレビューを行ってください。
          ARCHITECTURE.md準拠・コーディングルール準拠・テストカバレッジ・型安全性を確認してください。
      - run: "bun run check"
        description: "Biome lintチェック"
      - run: "bun run build"
        description: "ビルド確認"
      - merge

  # バグ修正（opencode使用）
  bugfix:
    description: バグ修正（根本原因特定 → 修正 → 回帰テスト → Merge）
    agent:
      type: "opencode"
    steps:
      - agent: implement
        instruction: "preset:fix"
        context: |
          バグを修正してください。

          ## 手順
          1. 根本原因を特定
          2. 最小限の修正を実施
          3. 回帰テストを追加

          ## 遵守事項
          - docs/arch/error-handling.md — Result型、エラー分類
          - strict: true、any型禁止
      - run: "bun run typecheck"
        description: "型チェック"
      - run: "bun run test"
        description: "テスト実行"
      - name: review
        max_loops: 3
        approval_policy: "on-request"
        rules:
          - condition: needs_fix
            next: implement
          - condition: approved
            next: merge
        context: |
          バグ修正のレビューを行ってください。
          根本原因の修正・回帰テスト追加・副作用なしを確認してください。
      - run: "bun run check"
        description: "Biome lintチェック"
      - run: "bun run build"
        description: "ビルド確認"
      - merge

  # リファクタリング（opencode使用）
  refactor:
    description: リファクタリング（コード分割・責務整理・型改善）
    agent:
      type: "opencode"
    steps:
      - agent: implement
        instruction: "preset:implement"
        context: |
          TypeScript/Bunプロジェクトのリファクタリングを行ってください。

          ## 遵守事項
          - docs/arch/coding-rules.md を必ず参照
          - docs/arch/design-principles.md — Tell Don't Ask、デメテルの法則
          - strict: true、any型禁止、1ファイル500行以下
          - 機能変更なし（純粋なリファクタリング）
      - run: "bun run typecheck"
        description: "型チェック"
      - run: "bun run test"
        description: "テスト実行"
      - name: review
        max_loops: 3
        approval_policy: "on-request"
        rules:
          - condition: needs_fix
            next: implement
          - condition: approved
            next: merge
        context: |
          リファクタリングのレビューを行ってください。
          機能変更がないこと・型安全性・コーディングルール準拠を確認してください。
      - run: "bun run check"
        description: "Biome lintチェック"
      - run: "bun run build"
        description: "ビルド確認"
      - merge

  # ドキュメント更新（pi使用）
  docs:
    description: ドキュメント更新（docs/配下、AGENTS.md、仕様書等）
    steps:
      - agent: implement
        instruction: "preset:implement"
        context: |
          ドキュメントを更新してください。

          ## 遵守事項
          - 既存記述との矛盾がないこと
          - docs/CONCEPT.md・docs/ARCHITECTURE.md との整合性を確認
          - YAMLキーはスネークケース
      - name: merge
        # approval_policy: "on-request"  # 有効にするとマージ前に人間の承認待ちになる

  # 軽微な修正（pi使用）
  quick:
    description: 軽微な修正（typo・設定値・コメント等）
    steps:
      - agent: implement
        instruction: "preset:implement"
        context: |
          軽微な修正を行ってください。変更は最小限に留めてください。
      - run: "bun run typecheck"
        description: "型チェック"
      - run: "bun run build"
        description: "ビルド確認"
      - name: merge
        # approval_policy: "on-request"  # 有効にするとマージ前に人間の承認待ちになる

# =====================================
# Self-Healing設定
# =====================================
self_healing:
  enabled: true
  max_simple_retries: 1
  max_diagnosed_retries: 2
  allow_step_skip: false
  escalate_to_human: true
  critical_steps:
    - implement
    - review
  auto_handover: true
  auto_create_issue: false

# =====================================
# メモリ設定
# =====================================
memory:
  inject_context: true
  max_tokens: 2000

# =====================================
# リトライ設定
# =====================================
retry:
  enabled: true
  max_attempts: 3
  preserve_worktree: true

# =====================================
# Intervention設定
# =====================================
intervention:
  stall_timeout: 300
  stall_action: "nudge"
  max_nudges: 3
  escalation_action: "stop"

# =====================================
# Hook設定
# =====================================
hooks:
  on_workflow_start: |
    osascript -e 'display notification "Issue #'"$PI_ISSUE_NUMBER"' を開始しました" with title "taskp" subtitle "🚀 開始" sound name "Pop"'

  on_workflow_end: |
    if [ "$PI_STATUS" = "success" ]; then
      osascript -e 'display notification "Issue #'"$PI_ISSUE_NUMBER"' が完了しました" with title "taskp" subtitle "✅ 完了" sound name "Glass"'
    else
      osascript -e 'display notification "Issue #'"$PI_ISSUE_NUMBER"' でエラーが発生しました" with title "taskp" subtitle "❌ エラー" sound name "Basso"'
    fi

  on_awaiting_approval: |
    osascript -e 'display notification "Issue #'"$PI_ISSUE_NUMBER"' のステップ「'"$PI_STEP_NAME"'」が承認待ちです" with title "taskp" subtitle "⏸ 承認待ち" sound name "Sosumi"'
